name: scenarios

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
      FLAGSMITH_ENVIRONMENT_KEY: ${{ secrets.FLAGSMITH_ENVIRONMENT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run scenarios
        run: pytest -v tests/ -m agent_test
